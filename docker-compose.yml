version: '3.8'

services:
  app:
    build:
      context: .
    container_name: myapp
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://user:password@db:5432/mydatabase
    ports:
      - "3000:3000"
    depends_on:
      - db

  db:
    image: postgres:13
    container_name: mydb
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydatabase
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
    driver: local
